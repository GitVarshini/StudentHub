<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner | StudentHub+</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">Student<span>Hub+</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </a>
        <a href="todo.html" class="sidebar-link">
          <i data-lucide="list-checks"></i> To-Do List
        </a>
        <a href="assignments.html" class="sidebar-link">
          <i data-lucide="clipboard-list"></i> Assignments
        </a>
        <a href="pomodoro.html" class="sidebar-link">
          <i data-lucide="timer"></i> Pomodoro
        </a>
        <a href="attendance.html" class="sidebar-link">
          <i data-lucide="percent"></i> Attendance
        </a>
        <a href="gpa.html" class="sidebar-link">
          <i data-lucide="calculator"></i> GPA Calculator
        </a>
        <a href="planner.html" class="sidebar-link active">
          <i data-lucide="calendar-days"></i> Study Planner
        </a>
        <a href="ai-helper.html" class="sidebar-link">
          <i data-lucide="sparkles"></i> AI Study Helper
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html" class="sidebar-link">
          <i data-lucide="arrow-left"></i> Back to Home
        </a>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-greeting">
          <h2>Study Planner</h2>
          <p>Plan your week, one slot at a time.</p>
        </div>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
          <i data-lucide="moon"></i>
        </button>
      </header>

      <main class="content-area">
        <div class="glass-card planner-card">

          <!-- Add entry form -->
          <form id="planner-form" class="planner-form">
            <div class="form-row planner-form-row">
              <div class="form-group">
                <label for="planner-day">Day</label>
                <select id="planner-day">
                  <option>Monday</option>
                  <option>Tuesday</option>
                  <option>Wednesday</option>
                  <option>Thursday</option>
                  <option>Friday</option>
                  <option>Saturday</option>
                  <option>Sunday</option>
                </select>
              </div>
              <div class="form-group">
                <label for="planner-time">Time</label>
                <input type="time" id="planner-time" required>
              </div>
              <div class="form-group">
                <label for="planner-activity">Activity</label>
                <input type="text" id="planner-activity" placeholder="e.g. Revise Chemistry" required maxlength="80">
              </div>
            </div>
            <button type="submit" class="btn btn-primary">
              <i data-lucide="plus"></i> Add to Schedule
            </button>
          </form>

          <!-- Weekly grid renders here -->
          <div id="planner-grid" class="planner-grid"></div>

        </div>
      </main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/planner.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
