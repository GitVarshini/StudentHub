<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List | StudentHub+</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">Student<span>Hub+</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </a>
        <a href="todo.html" class="sidebar-link active">
          <i data-lucide="list-checks"></i> To-Do List
        </a>
        <a href="assignments.html" class="sidebar-link">
          <i data-lucide="clipboard-list"></i> Assignments
        </a>
        <a href="pomodoro.html" class="sidebar-link">
          <i data-lucide="timer"></i> Pomodoro
        </a>
        <a href="attendance.html" class="sidebar-link">
          <i data-lucide="percent"></i> Attendance
        </a>
        <a href="gpa.html" class="sidebar-link">
          <i data-lucide="calculator"></i> GPA Calculator
        </a>
        <a href="planner.html" class="sidebar-link">
          <i data-lucide="calendar-days"></i> Study Planner
        </a>
        <a href="ai-helper.html" class="sidebar-link">
          <i data-lucide="sparkles"></i> AI Study Helper
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html" class="sidebar-link">
          <i data-lucide="arrow-left"></i> Back to Home
        </a>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-greeting">
          <h2>To-Do List</h2>
          <p>Small tasks, cleared fast.</p>
        </div>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
          <i data-lucide="moon"></i>
        </button>
      </header>

      <main class="content-area">
        <div class="glass-card todo-card">

          <!-- Add task form -->
          <form id="todo-form" class="todo-form">
            <input
              type="text"
              id="todo-input"
              placeholder="What do you need to do?"
              required
              maxlength="120"
            >
            <button type="submit" class="btn btn-primary">
              <i data-lucide="plus"></i> Add
            </button>
          </form>

          <!-- Filter tabs -->
          <div class="todo-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
          </div>

          <!-- Tasks get rendered here by JS -->
          <ul id="todo-list" class="todo-list"></ul>

          <!-- Shown when there are zero tasks (in the current filter) -->
          <p id="todo-empty" class="todo-empty hidden">
            Nothing here yet — add your first task above.
          </p>

          <!-- Footer: count + clear completed -->
          <div class="todo-footer">
            <span id="todo-count">0 tasks left</span>
            <button id="clear-completed" class="btn-text">Clear completed</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/todo.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
