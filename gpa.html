<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA Calculator | StudentHub+</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">Student<span>Hub+</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </a>
        <a href="todo.html" class="sidebar-link">
          <i data-lucide="list-checks"></i> To-Do List
        </a>
        <a href="assignments.html" class="sidebar-link">
          <i data-lucide="clipboard-list"></i> Assignments
        </a>
        <a href="pomodoro.html" class="sidebar-link">
          <i data-lucide="timer"></i> Pomodoro
        </a>
        <a href="attendance.html" class="sidebar-link">
          <i data-lucide="percent"></i> Attendance
        </a>
        <a href="gpa.html" class="sidebar-link active">
          <i data-lucide="calculator"></i> GPA Calculator
        </a>
        <a href="planner.html" class="sidebar-link">
          <i data-lucide="calendar-days"></i> Study Planner
        </a>
        <a href="ai-helper.html" class="sidebar-link">
          <i data-lucide="sparkles"></i> AI Study Helper
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html" class="sidebar-link">
          <i data-lucide="arrow-left"></i> Back to Home
        </a>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-greeting">
          <h2>GPA Calculator</h2>
          <p>Weighted by credits, calculated instantly.</p>
        </div>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
          <i data-lucide="moon"></i>
        </button>
      </header>

      <main class="content-area">
        <div class="glass-card gpa-card">

          <!-- Add subject form -->
          <form id="gpa-form" class="gpa-form">
            <div class="form-row gpa-form-row">
              <div class="form-group">
                <label for="gpa-subject">Subject</label>
                <input type="text" id="gpa-subject" placeholder="e.g. Data Structures" required maxlength="60">
              </div>
              <div class="form-group">
                <label for="gpa-credits">Credits</label>
                <input type="number" id="gpa-credits" min="1" max="10" step="1" value="3" required>
              </div>
              <div class="form-group">
                <label for="gpa-grade">Grade</label>
                <select id="gpa-grade">
                  <option value="10">A+ (10)</option>
                  <option value="9" selected>A (9)</option>
                  <option value="8">B+ (8)</option>
                  <option value="7">B (7)</option>
                  <option value="6">C+ (6)</option>
                  <option value="5">C (5)</option>
                  <option value="4">D (4)</option>
                  <option value="0">F (0)</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">
              <i data-lucide="plus"></i> Add Subject
            </button>
          </form>

          <!-- Subject rows render here -->
          <div class="gpa-table-wrap">
            <table class="gpa-table" id="gpa-table">
              <thead>
                <tr>
                  <th>Subject</th>
                  <th>Credits</th>
                  <th>Grade</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="gpa-table-body"></tbody>
            </table>
          </div>

          <p id="gpa-empty" class="todo-empty">
            Add subjects above to calculate your GPA.
          </p>

          <!-- Result -->
          <div id="gpa-result" class="gpa-result hidden">
            <span class="gpa-result-label">Your GPA</span>
            <span class="gpa-result-value" id="gpa-value">0.00</span>
            <span class="gpa-result-scale">/ 10</span>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/gpa.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
