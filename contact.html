<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | StudentHub+</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/landing.css">
</head>
<body>

  <header class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">Student<span>Hub+</span></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="navbar-actions">
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
          <i data-lucide="moon"></i>
        </button>
        <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
      </div>
    </div>
  </header>

  <section class="page-hero">
    <span class="hero-badge">Get in touch</span>
    <h1 class="hero-title">We'd love to <span class="gradient-text">hear from you</span></h1>
    <p class="hero-subtitle">Questions, feedback, or feature requests — send us a message.</p>
  </section>

  <section class="contact-content">
    <form class="glass-card contact-form" id="contact-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Your name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required placeholder="How can we help?"></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-lg">
        Send Message <i data-lucide="send"></i>
      </button>
      <p id="form-status" class="form-status hidden"></p>
    </form>
  </section>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="logo">Student<span>Hub+</span></span>
        <p>Your all-in-one student productivity dashboard.</p>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="dashboard.html">Dashboard</a>
      </div>
    </div>
    <p class="footer-copyright">&copy; 2026 StudentHub+. Built for a web dev hackathon.</p>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script>
    lucide.createIcons();

    // We have NO backend, so this form can't actually send an email.
    // We prevent the default page reload and just show a friendly
    // confirmation message instead — honest about what a static site can do.
    const form = document.getElementById("contact-form");
    const statusEl = document.getElementById("form-status");

    form.addEventListener("submit", (event) => {
      event.preventDefault(); // stop the browser's default full-page form submission

      statusEl.textContent = "Thanks for reaching out! (Demo only — no backend connected.)";
      statusEl.classList.remove("hidden");
      form.reset(); // clears all input fields
    });
  </script>
</body>
</html>
