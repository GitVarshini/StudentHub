<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Calculator | StudentHub+</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">Student<span>Hub+</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </a>
        <a href="todo.html" class="sidebar-link">
          <i data-lucide="list-checks"></i> To-Do List
        </a>
        <a href="assignments.html" class="sidebar-link">
          <i data-lucide="clipboard-list"></i> Assignments
        </a>
        <a href="pomodoro.html" class="sidebar-link">
          <i data-lucide="timer"></i> Pomodoro
        </a>
        <a href="attendance.html" class="sidebar-link active">
          <i data-lucide="percent"></i> Attendance
        </a>
        <a href="gpa.html" class="sidebar-link">
          <i data-lucide="calculator"></i> GPA Calculator
        </a>
        <a href="planner.html" class="sidebar-link">
          <i data-lucide="calendar-days"></i> Study Planner
        </a>
        <a href="ai-helper.html" class="sidebar-link">
          <i data-lucide="sparkles"></i> AI Study Helper
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html" class="sidebar-link">
          <i data-lucide="arrow-left"></i> Back to Home
        </a>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-greeting">
          <h2>Attendance Calculator</h2>
          <p>Know exactly where you stand.</p>
        </div>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
          <i data-lucide="moon"></i>
        </button>
      </header>

      <main class="content-area">
        <div class="glass-card attendance-card">

          <form id="attendance-form" class="attendance-form">
            <div class="form-row">
              <div class="form-group">
                <label for="classes-attended">Classes attended</label>
                <input type="number" id="classes-attended" min="0" required placeholder="e.g. 42">
              </div>
              <div class="form-group">
                <label for="classes-total">Total classes held</label>
                <input type="number" id="classes-total" min="0" required placeholder="e.g. 50">
              </div>
            </div>

            <div class="form-group">
              <label for="target-percent">Target attendance %</label>
              <input type="number" id="target-percent" min="1" max="100" value="75">
            </div>

            <button type="submit" class="btn btn-primary">
              <i data-lucide="calculator"></i> Calculate
            </button>
          </form>

          <div id="attendance-result" class="attendance-result hidden">
            <div class="attendance-ring-wrap">
              <svg class="attendance-ring" viewBox="0 0 200 200">
                <circle class="ring-track" cx="100" cy="100" r="90"></circle>
                <circle id="attendance-ring-progress" class="ring-progress" cx="100" cy="100" r="90"></circle>
              </svg>
              <div class="attendance-percent" id="attendance-percent-text">0%</div>
            </div>
            <p id="attendance-message" class="attendance-message"></p>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/attendance.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
