<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer | StudentHub+</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">Student<span>Hub+</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </a>
        <a href="todo.html" class="sidebar-link">
          <i data-lucide="list-checks"></i> To-Do List
        </a>
        <a href="assignments.html" class="sidebar-link">
          <i data-lucide="clipboard-list"></i> Assignments
        </a>
        <a href="pomodoro.html" class="sidebar-link active">
          <i data-lucide="timer"></i> Pomodoro
        </a>
        <a href="attendance.html" class="sidebar-link">
          <i data-lucide="percent"></i> Attendance
        </a>
        <a href="gpa.html" class="sidebar-link">
          <i data-lucide="calculator"></i> GPA Calculator
        </a>
        <a href="planner.html" class="sidebar-link">
          <i data-lucide="calendar-days"></i> Study Planner
        </a>
        <a href="ai-helper.html" class="sidebar-link">
          <i data-lucide="sparkles"></i> AI Study Helper
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html" class="sidebar-link">
          <i data-lucide="arrow-left"></i> Back to Home
        </a>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-greeting">
          <h2>Pomodoro Timer</h2>
          <p>Focus in short, structured bursts.</p>
        </div>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
          <i data-lucide="moon"></i>
        </button>
      </header>

      <main class="content-area">
        <div class="glass-card pomodoro-card">

          <span id="pomodoro-mode-label" class="pomodoro-mode focus">Focus Session</span>

          <!-- Circular progress ring built with SVG -->
          <div class="pomodoro-ring-wrap">
            <svg class="pomodoro-ring" viewBox="0 0 200 200">
              <circle class="ring-track" cx="100" cy="100" r="90"></circle>
              <circle id="ring-progress" class="ring-progress" cx="100" cy="100" r="90"></circle>
            </svg>
            <div class="pomodoro-time" id="pomodoro-time">25:00</div>
          </div>

          <div class="pomodoro-controls">
            <button id="pomodoro-start" class="btn btn-primary btn-lg">
              <i data-lucide="play"></i> Start
            </button>
            <button id="pomodoro-pause" class="btn btn-ghost btn-lg hidden">
              <i data-lucide="pause"></i> Pause
            </button>
            <button id="pomodoro-reset" class="btn btn-ghost btn-lg">
              <i data-lucide="rotate-ccw"></i> Reset
            </button>
          </div>

          <div class="pomodoro-stats">
            <div class="stat">
              <span class="stat-value" id="session-count">0</span>
              <span class="stat-label">Sessions completed</span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/pomodoro.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
