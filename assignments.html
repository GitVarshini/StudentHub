<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments | StudentHub+</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">Student<span>Hub+</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </a>
        <a href="todo.html" class="sidebar-link">
          <i data-lucide="list-checks"></i> To-Do List
        </a>
        <a href="assignments.html" class="sidebar-link active">
          <i data-lucide="clipboard-list"></i> Assignments
        </a>
        <a href="pomodoro.html" class="sidebar-link">
          <i data-lucide="timer"></i> Pomodoro
        </a>
        <a href="attendance.html" class="sidebar-link">
          <i data-lucide="percent"></i> Attendance
        </a>
        <a href="gpa.html" class="sidebar-link">
          <i data-lucide="calculator"></i> GPA Calculator
        </a>
        <a href="planner.html" class="sidebar-link">
          <i data-lucide="calendar-days"></i> Study Planner
        </a>
        <a href="ai-helper.html" class="sidebar-link">
          <i data-lucide="sparkles"></i> AI Study Helper
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html" class="sidebar-link">
          <i data-lucide="arrow-left"></i> Back to Home
        </a>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-greeting">
          <h2>Assignment Manager</h2>
          <p>Track what's due, and when.</p>
        </div>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
          <i data-lucide="moon"></i>
        </button>
      </header>

      <main class="content-area">
        <div class="glass-card assignment-card">

          <!-- Add assignment form -->
          <form id="assignment-form" class="assignment-form">
            <div class="form-row">
              <div class="form-group">
                <label for="assignment-subject">Subject</label>
                <input type="text" id="assignment-subject" placeholder="e.g. Physics" required maxlength="60">
              </div>
              <div class="form-group">
                <label for="assignment-title">Assignment</label>
                <input type="text" id="assignment-title" placeholder="e.g. Lab report 3" required maxlength="100">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="assignment-due">Due date</label>
                <input type="date" id="assignment-due" required>
              </div>
              <div class="form-group">
                <label for="assignment-priority">Priority</label>
                <select id="assignment-priority">
                  <option value="low">Low</option>
                  <option value="medium" selected>Medium</option>
                  <option value="high">High</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">
              <i data-lucide="plus"></i> Add Assignment
            </button>
          </form>

          <!-- Assignments render here -->
          <div id="assignment-list" class="assignment-list"></div>

          <p id="assignment-empty" class="todo-empty hidden">
            No assignments yet — add one above to get started.
          </p>
        </div>
      </main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/assignments.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
